services:
  - type: web
    name: devlog-api
    runtime: python
    buildCommand: pip install -e .
    startCommand: alembic upgrade head && uvicorn devlog.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: devlog-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.9.0

databases:
  - name: devlog-db
    plan: free
